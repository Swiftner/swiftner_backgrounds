<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Swiftner Backgrounds</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap">
<style>
  @font-face {
    font-family: 'TT Trailers';
    src: url('fonts/TT-Trailers.ttf') format('truetype');
    font-weight: 600;
    font-style: italic;
    font-display: swap;
  }
  :root {
    --navy-950:#13194a;
    --indigo-950:#221b4b;
    --olive-100:#ffffe8;
    --purple:#4E169C;
    --purple-hover:#3d1280;
    --ink:#111827;
    --muted:#6b7280;
    --line:#e5e7eb;
  }
  * { box-sizing:border-box; }
  html,body { margin:0; padding:0; background:var(--olive-100); color:var(--ink);
              font-family:'DM Sans', ui-sans-serif, system-ui, sans-serif; }
  a { color:var(--purple); text-decoration:none; }
  a:hover { color:var(--purple-hover); }
  header { padding:48px 48px 28px; border-bottom:1px solid var(--line); display:flex; gap:10px 24px; align-items:baseline; flex-wrap:wrap; }
  h1 { margin:0; font-family:'TT Trailers', Impact, 'Arial Black', sans-serif; font-weight:600; font-style:italic; font-size:56px; letter-spacing:-0.01em; color:var(--navy-950); line-height:1; }
  .sub { color:var(--muted); font-family:'DM Mono', ui-monospace, monospace; font-size:13px; letter-spacing:0.02em; text-transform:uppercase; }
  main { display:grid; grid-template-columns:repeat(auto-fill, minmax(280px, 1fr)); gap:20px; padding:28px 48px 48px; }
  .card { background:#fff; border:1px solid var(--line); border-radius:10px; overflow:hidden; display:flex; flex-direction:column;
          text-decoration:none; color:inherit; transition:border-color .15s, box-shadow .15s, transform .15s; }
  .card:hover { border-color:var(--purple); box-shadow:0 6px 24px -12px rgba(78,22,156,.25); }
  .preview { aspect-ratio:1/1; border:0; border-bottom:1px solid var(--line); background:#fff; width:100%; display:block; }
  .meta { padding:14px 16px; display:flex; justify-content:space-between; align-items:baseline; gap:12px; }
  .t { font-size:14px; font-weight:600; color:var(--navy-950); letter-spacing:-0.005em; }
  .dl { display:inline-flex; align-items:center; justify-content:center; width:28px; height:28px; border-radius:999px;
        color:var(--muted); transition:color .15s, background .15s; }
  .dl:hover { color:var(--purple); background:rgba(78,22,156,.08); }
  .dl svg { width:16px; height:16px; display:block; }
  @media (max-width: 640px) {
    header { padding:28px 24px 18px; }
    main { padding:20px 24px 32px; }
    h1 { font-size:28px; }
  }
</style>
</head>
<body>
<header>
  <h1>Swiftner Backgrounds</h1>
</header>
<main id="grid"></main>

<script>
const assets = [
  { name: 'Blob1' }, { name: 'Blob2' }, { name: 'Blob3' },
  { name: 'Mesh1' }, { name: 'Mesh2' }, { name: 'Mesh3' },
  { name: 'Wave1' }, { name: 'Wave2' }, { name: 'Wave3' },
];

const grid = document.getElementById('grid');
for (const a of assets) {
  const file = a.name + '.svg';
  const card = document.createElement('a');
  card.className = 'card';
  card.href = 'generated/' + a.name + '.html';
  card.innerHTML =
    '<img class="preview" src="' + file + '" alt="' + a.name + '" loading="lazy">' +
    '<div class="meta">' +
      '<span class="t">' + a.name + '</span>' +
      '<a class="dl" href="' + file + '" download title="Download SVG" aria-label="Download SVG" onclick="event.stopPropagation()">' +
        '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>' +
      '</a>' +
    '</div>';
  grid.appendChild(card);
}
</script>
</body>
</html>
