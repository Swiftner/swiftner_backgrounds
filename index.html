<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Swiftner Backgrounds</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&family=Playfair+Display:wght@500;600&display=swap">
<style>
  :root {
    --navy-950:#13194a;
    --indigo-950:#221b4b;
    --olive-100:#ffffe8;
    --purple:#4E169C;
    --purple-hover:#3d1280;
    --ink:#111827;
    --muted:#6b7280;
    --line:#e5e7eb;
  }
  * { box-sizing:border-box; }
  html,body { margin:0; padding:0; background:var(--olive-100); color:var(--ink);
              font-family:'DM Sans', ui-sans-serif, system-ui, sans-serif; }
  a { color:var(--purple); text-decoration:none; }
  a:hover { color:var(--purple-hover); }
  header { padding:40px 48px 24px; border-bottom:1px solid var(--line); display:flex; gap:10px 20px; align-items:baseline; flex-wrap:wrap; }
  h1 { margin:0; font-family:'Playfair Display', Georgia, serif; font-weight:600; font-size:36px; letter-spacing:-0.01em; color:var(--navy-950); }
  .sub { color:var(--muted); font-family:'DM Mono', ui-monospace, monospace; font-size:13px; letter-spacing:0.02em; text-transform:uppercase; }
  main { display:grid; grid-template-columns:repeat(auto-fill, minmax(280px, 1fr)); gap:20px; padding:28px 48px 48px; }
  .card { background:#fff; border:1px solid var(--line); border-radius:10px; overflow:hidden; display:flex; flex-direction:column;
          text-decoration:none; color:inherit; transition:border-color .15s, box-shadow .15s, transform .15s; }
  .card:hover { border-color:var(--purple); box-shadow:0 6px 24px -12px rgba(78,22,156,.25); }
  .preview { aspect-ratio:1/1; border:0; border-bottom:1px solid var(--line); background:#fff; width:100%; display:block; }
  .meta { padding:14px 16px; display:flex; justify-content:space-between; align-items:baseline; gap:12px; }
  .t { font-size:14px; font-weight:600; color:var(--navy-950); letter-spacing:-0.005em; }
  .dl { font-family:'DM Mono', ui-monospace, monospace; font-size:11px; color:var(--muted); letter-spacing:0.04em; text-transform:uppercase; }
  .dl:hover { color:var(--purple); }
  @media (max-width: 640px) {
    header { padding:28px 24px 18px; }
    main { padding:20px 24px 32px; }
    h1 { font-size:28px; }
  }
</style>
</head>
<body>
<header>
  <h1>Swiftner Backgrounds</h1>
  <span class="sub">Blob &middot; Mesh &middot; Wave</span>
</header>
<main id="grid"></main>

<script>
const assets = [
  { name: 'Blob1' }, { name: 'Blob2' }, { name: 'Blob3' },
  { name: 'Mesh1' }, { name: 'Mesh2' }, { name: 'Mesh3' },
  { name: 'Wave1' }, { name: 'Wave2' }, { name: 'Wave3' },
];

const grid = document.getElementById('grid');
for (const a of assets) {
  const file = a.name + '.svg';
  const card = document.createElement('a');
  card.className = 'card';
  card.href = 'generated/' + a.name + '.html';
  card.innerHTML =
    '<img class="preview" src="' + file + '" alt="' + a.name + '" loading="lazy">' +
    '<div class="meta">' +
      '<span class="t">' + a.name + '</span>' +
      '<a class="dl" href="' + file + '" download onclick="event.stopPropagation()">source</a>' +
    '</div>';
  grid.appendChild(card);
}
</script>
</body>
</html>
