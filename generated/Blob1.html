function mount(target, preset, options = {}) {

  const start = performance.now();
  const FRAME_MS = 1000 / fps;
  let lastRender = -Infinity;
  let rafId = 0;
  let stopped = false;

  const loop = (now) => {
    rafId = 0;
    if (stopped) return;
    if (now - lastRender >= FRAME_MS) {

    canvas,

      stopped = true;
